<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visionary AI | Image Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');

        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #7000ff;
            --bg-dark: #050505;
        }

        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050505 100%);
            min-height: 100vh;
        }

        .font-futuristic { font-family: 'Orbitron', sans-serif; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
        }

        .neon-border:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
        }

        .image-card {
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .image-card:hover {
            transform: scale(1.03) translateY(-10px);
            box-shadow: 0 10px 30px rgba(0, 242, 255, 0.2);
        }

        .image-card img {
            transition: transform 0.6s ease;
        }

        .image-card:hover img {
            transform: scale(1.1);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: var(--neon-purple); border-radius: 10px; }
    </style>
</head>
<body class="pb-20">

    <nav class="p-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <div class="w-10 h-10 bg-gradient-to-tr from-cyan-400 to-purple-600 rounded-lg flex items-center justify-center shadow-lg shadow-cyan-500/20">
                    <i class="fas fa-bolt text-black"></i>
                </div>
                <span class="font-futuristic text-xl tracking-widest font-bold bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-purple-400">VISIONARY</span>
            </div>
            
            <div class="hidden md:flex items-center glass-panel px-4 py-2 space-x-4">
                <div class="text-right">
                    <p class="text-[10px] uppercase text-gray-500 font-bold">Developed By</p>
                    <p class="text-sm font-futuristic text-white">🌴🎏 БILДLΞ </p>
                </div>
                <a href="https://t.me/Bilal_Cipher" target="_blank" class="w-10 h-10 rounded-full bg-blue-500/20 flex items-center justify-center hover:bg-blue-500 transition-colors group">
                    <i class="fab fa-telegram-plane group-hover:scale-110 transition-transform"></i>
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 mt-12 text-center">
        <h1 class="font-futuristic text-5xl md:text-7xl mb-6 font-bold tracking-tighter">
            DEEP <span class="text-cyan-400">SEARCH</span> AI
        </h1>
        <p class="text-gray-400 max-w-2xl mx-auto mb-10 text-lg">Experience the next generation of image intelligence. Fast, precise, and aesthetic.</p>

        <div class="relative max-w-3xl mx-auto mb-16">
            <div class="absolute -inset-1 bg-gradient-to-r from-cyan-500 to-purple-600 rounded-full blur opacity-25 group-hover:opacity-100 transition duration-1000 group-hover:duration-200"></div>
            <div class="relative flex items-center bg-[#111] rounded-full p-2 border border-white/10">
                <i class="fas fa-search ml-6 text-gray-500"></i>
                <input type="text" id="searchInput" placeholder="Search the multiverse..." 
                    class="w-full bg-transparent px-6 py-4 outline-none text-white text-lg placeholder-gray-600">
                <button onclick="searchImages()" class="bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-black font-bold px-10 py-4 rounded-full transition-all transform active:scale-95 font-futuristic">
                    INITIALIZE
                </button>
            </div>
        </div>

        <div id="loader" class="hidden">
            <div class="flex justify-center space-x-2 animate-pulse">
                <div class="w-3 h-3 bg-cyan-400 rounded-full"></div>
                <div class="w-3 h-3 bg-purple-500 rounded-full"></div>
                <div class="w-3 h-3 bg-cyan-400 rounded-full"></div>
            </div>
            <p class="mt-4 font-futuristic text-cyan-400 text-xs tracking-[0.3em]">SCANNING DATABASE...</p>
        </div>

        <div id="resultsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <div class="md:hidden fixed bottom-6 left-1/2 -translate-x-1/2 glass-panel px-6 py-3 flex items-center space-x-4 border border-cyan-500/30">
        <span class="font-futuristic text-xs">BY: YOUR NAME</span>
        <a href="https://t.me/YourTelegramUsername" class="text-cyan-400"><i class="fab fa-telegram-plane"></i></a>
    </div>

    <script>
        async function searchImages() {
            const query = document.getElementById('searchInput').value;
            const grid = document.getElementById('resultsGrid');
            const loader = document.getElementById('loader');

            if (!query) return;

            // Reset & Start Loading
            grid.innerHTML = '';
            loader.classList.remove('hidden');

            try {
                const response = await fetch(`https://microsoftdeepsearch.anshppt19.workers.dev/?search=${encodeURIComponent(query)}&state=image`);
                const data = await response.json();

                loader.classList.add('hidden');

                if (data.status === "success" && data.images.results.length > 0) {
                    data.images.results.forEach((imgUrl, index) => {
                        const cleanUrl = imgUrl.replace(/&amp;/g, '&');
                        
                        const card = `
                            <div class="image-card glass-panel group p-2" style="animation: fadeInUp 0.5s ease forwards ${index * 0.1}s; opacity: 0;">
                                <div class="relative h-72 rounded-xl overflow-hidden">
                                    <img src="${cleanUrl}" class="w-full h-full object-cover">
                                    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex flex-col justify-end p-6">
                                        <div class="flex justify-between items-center">
                                            <span class="text-xs font-futuristic text-cyan-400">IMG-RESULT-${index + 1}</span>
                                            <a href="${cleanUrl}" target="_blank" class="w-8 h-8 rounded-full bg-white/20 backdrop-blur flex items-center justify-center hover:bg-white/40 transition-all">
                                                <i class="fas fa-expand text-xs"></i>
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                        grid.innerHTML += card;
                    });
                }
            } catch (error) {
                loader.classList.add('hidden');
                console.error("Link Error:", error);
            }
        }

        // Add Animation Keyframes
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeInUp {
                from { opacity: 0; transform: translateY(30px); }
                to { opacity: 1; transform: translateY(0); }
            }
        `;
        document.head.appendChild(style);

        // Enter Key Listener
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchImages();
        });
    </script>
</body>
</html>
